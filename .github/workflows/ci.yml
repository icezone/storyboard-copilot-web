name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type check + Lint + Unit tests + Build
    runs-on: ubuntu-latest
    env:
      # Stub env vars so Next.js build succeeds in CI without real Supabase
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      ENCRYPTION_KEY: ci-placeholder-encryption-key-32ch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Validate database migrations (RLS check)
        run: |
          # Only validate NEW migration files added in this commit/PR
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/main...HEAD | grep 'supabase/migrations/.*\.sql$' || true)

          if [ -n "$NEW_MIGRATIONS" ]; then
            echo "Validating new database migrations for RLS policies..."
            echo "$NEW_MIGRATIONS" | while read migration; do
              if [ -f "$migration" ]; then
                echo "Checking: $migration"
                node scripts/validate-rls-migration.js "$migration" || exit 1
              fi
            done
            echo "✅ All new migrations validated"
          else
            echo "No new migrations to validate"
          fi

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Fall back to placeholders so the Next.js server can start even without
      # real secrets. Tests that require real auth are skipped via test.skip()
      # unless E2E_TEST_EMAIL / E2E_TEST_PASSWORD are also set.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'ci-placeholder-encryption-key-32ch' }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
